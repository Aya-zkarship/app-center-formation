<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpSkill · Admin Dashboard</title>

  <!-- Bootstrap 5 + Icons + Font Awesome (pour plus d'options) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js pour graphiques simples -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ========== VARIABLES & RESET (inchangé) ========== */
    :root {
      --sidebar-bg: #1e2b3a;
      --sidebar-hover: #2c3e50;
      --primary-color: #4361ee;
      --success-color: #06d6a0;
      --warning-color: #ffb703;
      --danger-color: #ef476f;
      --light-bg: #f8f9fa;
      --card-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,20,50,0.05);
      --transition: all 0.2s ease;
    }

    body {
      background-color: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
    }

    /* ========== SIDEBAR (inchangé) ========== */
    .sidebar {
      background-color: var(--sidebar-bg);
      min-height: 100vh;
      box-shadow: 2px 0 12px rgba(0,0,0,0.03);
      transition: var(--transition);
      position: sticky;
      top: 0;
    }
    
    .sidebar .logo {
      color: white;
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      padding: 1.5rem 1rem 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar .logo i {
      color: #a5d8ff;
      font-size: 2rem;
    }
    .sidebar .logo span {
      background: rgba(255,255,255,0.1);
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      margin-left: 8px;
      color: #99b8d4;
      font-weight: 300;
    }
    
    .sidebar .nav-link {
      color: #cdd9e6;
      font-weight: 450;
      padding: 0.75rem 1.2rem;
      border-radius: 12px;
      margin: 0.2rem 0.5rem;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sidebar .nav-link i {
      width: 1.6rem;
      font-size: 1.2rem;
      text-align: center;
    }
    .sidebar .nav-link:hover {
      background-color: var(--sidebar-hover);
      color: white;
    }
    .sidebar .nav-link.active {
      background: var(--primary-color);
      color: white;
      box-shadow: 0 8px 14px -6px rgba(67, 97, 238, 0.4);
    }

    /* ========== MAIN PANEL ========== */
    .main-panel {
      padding: 1.8rem 2rem;
    }
    .page-title {
      font-weight: 600;
      color: #1e293b;
      letter-spacing: -0.3px;
    }

    /* ========== CARDS STATS ========== */
    .stat-card {
      background: white;
      border: none;
      border-radius: 26px;
      padding: 1.5rem 1.2rem;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-3px);
    }
    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(67, 97, 238, 0.1);
      color: var(--primary-color);
      font-size: 1.8rem;
    }

    /* ========== TABLES ========== */
    .table-wrapper {
      background: white;
      border-radius: 28px;
      padding: 1.5rem 1rem;
      box-shadow: var(--card-shadow);
      margin-top: 1.2rem;
    }
    .table {
      margin-bottom: 0;
      color: #1e293b;
    }
    .table thead th {
      border-bottom: 2px solid #e9edf4;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      color: #5b687c;
    }
    .table td, .table th {
      vertical-align: middle;
      padding: 1rem 0.8rem;
    }
    .badge-statut {
      padding: 0.4rem 0.9rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
    }
    .badge-paye { background: #d1f7ea; color: #0b5e42; }
    .badge-attente { background: #fff3cd; color: #856404; }
    .badge-echoue { background: #f8d7da; color: #721c24; }

    .btn-soft {
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      background: #f1f5f9;
      color: #1e293b;
      border: none;
      font-size: 0.85rem;
      transition: var(--transition);
    }
    .btn-soft:hover {
      background: #e2e8f0;
    }
    .btn-primary-custom {
      background: var(--primary-color);
      border: none;
      border-radius: 40px;
      padding: 0.5rem 1.6rem;
      font-weight: 500;
      box-shadow: 0 6px 12px -6px rgba(67,97,238,0.4);
    }

    /* ========== MODAL ========== */
    .modal-content {
      border-radius: 28px;
      border: none;
      padding: 0.5rem;
    }

    /* ========== UTILS ========== */
    .avatar-sm {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      object-fit: cover;
    }
    .pagination .page-link {
      border: none;
      color: var(--primary-color);
      border-radius: 12px;
      margin: 0 4px;
    }
    .code-acces {
      font-family: monospace;
      background: #f1f5f9;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      display: inline-block;
    }
    /* responsive mobile */
    @media (max-width: 768px) {
      .sidebar {
        min-height: auto;
        position: relative;
      }
      .main-panel { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <!-- ========== SIDEBAR (inchangé) ========== -->
    <div class="col-md-3 col-lg-2 p-0 sidebar">
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        UpSkill
      </div>
      <nav class="nav flex-column mt-2">
        <a class="nav-link active" href="#" data-page="dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="nav-link" href="#" data-page="clients"><i class="bi bi-people"></i>Clients</a>
        <a class="nav-link" href="#" data-page="formateurs"><i class="bi bi-person-video3"></i>Formateurs</a>
        <a class="nav-link" href="#" data-page="formations"><i class="bi bi-journal-bookmark-fill"></i>Formations</a>
        <a class="nav-link" href="#" data-page="categories"><i class="bi bi-tags"></i>Catégories</a>
        <a class="nav-link" href="#" data-page="paiements"><i class="bi bi-credit-card"></i>Paiements</a>
        <a class="nav-link" href="#" data-page="parametres"><i class="bi bi-gear"></i>Paramètres</a>
        <div class="mt-5 pt-4">
          <a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i>Déconnexion</a>
        </div>
      </nav>
    </div>

    <!-- ========== CONTENU DYNAMIQUE ========== -->
    <div class="col-md-9 col-lg-10 main-panel" id="mainContent">
      <!-- le contenu sera chargé dynamiquement -->
    </div>
  </div>
</div>

<!-- ========== MODALS DYNAMIQUES ========== -->
<!-- Modal Formation -->
<div class="modal fade" id="formationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalFormationTitle">Ajouter une formation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formationForm">
          <input type="hidden" id="formationId" value="">
          <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" class="form-control" id="formationNom" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="2" id="formationDescription"></textarea>
          </div>
          <div class="row">
            <div class="col">
              <label class="form-label">Prix (€)</label>
              <input type="number" class="form-control" id="formationPrix" required min="0">
            </div>
            <div class="col">
              <label class="form-label">Durée (h)</label>
              <input type="number" class="form-control" id="formationDuree" required min="1">
            </div>
          </div>
          <div class="row mt-3">
            <div class="col">
              <label class="form-label">Catégorie</label>
              <select class="form-select" id="formationCategorie" required></select>
            </div>
            <div class="col">
              <label class="form-label">Formateur</label>
              <select class="form-select" id="formationFormateur" required></select>
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label class="form-label">Image URL (optionnel)</label>
            <input type="text" class="form-control" id="formationImage" placeholder="https://...">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="saveFormation()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Client (AJOUT : champ codeAcces masqué mais généré automatiquement) -->
<div class="modal fade" id="clientModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalClientTitle">Ajouter un client</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="clientForm">
          <input type="hidden" id="clientId" value="">
          <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" id="clientNom" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="clientEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Téléphone</label>
            <input type="tel" class="form-control" id="clientTel" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Date d'inscription</label>
            <input type="date" class="form-control" id="clientDate" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Formations inscrites (séparées par des virgules)</label>
            <input type="text" class="form-control" id="clientFormations" placeholder="ex: React, Python">
          </div>
          <!-- Le code d'accès est généré automatiquement (non modifiable) -->
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="saveClient()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Formateur -->
<div class="modal fade" id="formateurModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalFormateurTitle">Ajouter un formateur</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formateurForm">
          <input type="hidden" id="formateurId" value="">
          <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" id="formateurNom" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Spécialité</label>
            <input type="text" class="form-control" id="formateurSpecialite" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="formateurEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Formations assignées (séparées par des virgules)</label>
            <input type="text" class="form-control" id="formateurFormations" placeholder="ex: React, Vue">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="saveFormateur()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Catégorie -->
<div class="modal fade" id="categorieModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalCategorieTitle">Ajouter une catégorie</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="categorieForm">
          <input type="hidden" id="categorieId" value="">
          <div class="mb-3">
            <label class="form-label">Nom de la catégorie</label>
            <input type="text" class="form-control" id="categorieNom" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="saveCategorie()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Paiement -->
<div class="modal fade" id="paiementModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Ajouter un paiement</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="paiementForm">
          <input type="hidden" id="paiementId" value="">
          <div class="mb-3">
            <label class="form-label">Client</label>
            <select class="form-select" id="paiementClient" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Formation</label>
            <select class="form-select" id="paiementFormation" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Montant (€)</label>
            <input type="number" class="form-control" id="paiementMontant" required min="0">
          </div>
          <div class="mb-3">
            <label class="form-label">Statut</label>
            <select class="form-select" id="paiementStatut" required>
              <option value="Payé">Payé</option>
              <option value="En attente">En attente</option>
              <option value="Échoué">Échoué</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="paiementDate" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="savePaiement()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ==================== GESTIONNAIRE DE DONNÉES ====================
  class DataManager {
    constructor() {
      this.storageKey = 'upskill_dashboard_data';
      this.initData();
      this.charts = {};
    }

    initData() {
      const stored = localStorage.getItem(this.storageKey);
      if (stored) {
        this.data = JSON.parse(stored);
      } else {
        this.data = {
          clients: [
            { id: 'c1', nom: "Dupont Marie", email: "marie.d@email.com", tel: "06 12 34 56 78", date: "2025-01-12", formations: "React, UX", codeAcces: "ACC-MARIE-8X2K" },
            { id: 'c2', nom: "Lebrun Thomas", email: "t.lebrun@email.com", tel: "07 23 45 67 89", date: "2025-02-23", formations: "Python, Data", codeAcces: "ACC-THOMAS-7F9L" },
            { id: 'c3', nom: "Petit Laura", email: "laura.p@email.com", tel: "06 34 56 78 90", date: "2025-03-05", formations: "Design System", codeAcces: "ACC-LAURA-3G5M" },
          ],
          formateurs: [
            { id: 'f1', nom: "Julie Anne", specialite: "Développement Frontend", email: "j.anne@upskill.com", formations: "React, Vue" },
            { id: 'f2', nom: "Marc Levy", specialite: "Data Science", email: "m.levy@upskill.com", formations: "Python, ML" },
            { id: 'f3', nom: "Sophie D.", specialite: "Design UI/UX", email: "s.design@upskill.com", formations: "Figma, Adobe" },
          ],
          formations: [
            { id: 'form1', nom: "React Masterclass", description: "Formation complète React", categorie: "Développement", formateur: "Julie Anne", prix: 299, duree: 35, image: "https://placehold.co/40x40/4361ee/white?text=React" },
            { id: 'form2', nom: "Python pour Data", description: "Data science avec Python", categorie: "Data", formateur: "Marc Levy", prix: 249, duree: 40, image: "https://placehold.co/40x40/06d6a0/white?text=Python" },
            { id: 'form3', nom: "Design UX/UI", description: "Les fondamentaux du design", categorie: "Design", formateur: "Sophie D.", prix: 199, duree: 28, image: "https://placehold.co/40x40/ffb703/white?text=UX" },
          ],
          categories: [
            { id: 'cat1', nom: "Développement", nbFormations: 0 },
            { id: 'cat2', nom: "Design", nbFormations: 0 },
            { id: 'cat3', nom: "Data", nbFormations: 0 },
            { id: 'cat4', nom: "Business", nbFormations: 0 },
          ],
          paiements: [
            { id: 'p1', client: "Dupont Marie", formation: "React Masterclass", montant: 299, statut: "Payé", date: "2025-01-15" },
            { id: 'p2', client: "Lebrun Thomas", formation: "Python pour Data", montant: 249, statut: "En attente", date: "2025-03-02" },
            { id: 'p3', client: "Petit Laura", formation: "Design UX/UI", montant: 199, statut: "Échoué", date: "2025-03-10" },
          ]
        };
        this.updateCategoriesCount();
        this.saveToStorage();
      }
    }

    saveToStorage() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.data));
    }

    updateCategoriesCount() {
      const counts = {};
      this.data.formations.forEach(f => {
        counts[f.categorie] = (counts[f.categorie] || 0) + 1;
      });
      this.data.categories.forEach(c => {
        c.nbFormations = counts[c.nom] || 0;
      });
    }

    generateId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Génère un code d'accès unique pour un client
    generateCodeAcces(nom) {
      const prefix = "ACC";
      const nomPart = nom.substring(0, 4).toUpperCase().replace(/[^A-Z]/g, '');
      const randomPart = Math.random().toString(36).substring(2, 6).toUpperCase();
      return `${prefix}-${nomPart || 'USER'}-${randomPart}`;
    }

    // CLIENTS
    getClients() { return this.data.clients; }
    
    addClient(client) {
      // Génération automatique du code d'accès
      const codeAcces = this.generateCodeAcces(client.nom);
      const newClient = { ...client, id: this.generateId(), codeAcces };
      this.data.clients.push(newClient);
      this.saveToStorage();
      return newClient;
    }
    
    updateClient(id, updatedClient) {
      const index = this.data.clients.findIndex(c => c.id === id);
      if (index !== -1) {
        // Conserver l'ancien codeAcces (ne pas le regénérer)
        const oldCode = this.data.clients[index].codeAcces;
        this.data.clients[index] = { ...updatedClient, id, codeAcces: oldCode };
        this.saveToStorage();
        return true;
      }
      return false;
    }
    
    deleteClient(id) {
      this.data.clients = this.data.clients.filter(c => c.id !== id);
      this.saveToStorage();
    }

    // FORMATEURS
    getFormateurs() { return this.data.formateurs; }
    addFormateur(formateur) {
      const newFormateur = { ...formateur, id: this.generateId() };
      this.data.formateurs.push(newFormateur);
      this.saveToStorage();
      return newFormateur;
    }
    updateFormateur(id, updatedFormateur) {
      const index = this.data.formateurs.findIndex(f => f.id === id);
      if (index !== -1) {
        this.data.formateurs[index] = { ...updatedFormateur, id };
        this.saveToStorage();
        return true;
      }
      return false;
    }
    deleteFormateur(id) {
      this.data.formateurs = this.data.formateurs.filter(f => f.id !== id);
      this.saveToStorage();
    }

    // FORMATIONS
    getFormations() { return this.data.formations; }
    addFormation(formation) {
      const newFormation = { ...formation, id: this.generateId() };
      this.data.formations.push(newFormation);
      this.updateCategoriesCount();
      this.saveToStorage();
      return newFormation;
    }
    updateFormation(id, updatedFormation) {
      const index = this.data.formations.findIndex(f => f.id === id);
      if (index !== -1) {
        this.data.formations[index] = { ...updatedFormation, id };
        this.updateCategoriesCount();
        this.saveToStorage();
        return true;
      }
      return false;
    }
    deleteFormation(id) {
      this.data.formations = this.data.formations.filter(f => f.id !== id);
      this.updateCategoriesCount();
      this.saveToStorage();
    }

    // CATÉGORIES
    getCategories() { return this.data.categories; }
    addCategorie(categorie) {
      const newCategorie = { ...categorie, id: this.generateId(), nbFormations: 0 };
      this.data.categories.push(newCategorie);
      this.saveToStorage();
      return newCategorie;
    }
    updateCategorie(id, updatedCategorie) {
      const index = this.data.categories.findIndex(c => c.id === id);
      if (index !== -1) {
        this.data.categories[index] = { ...updatedCategorie, id, nbFormations: this.data.categories[index].nbFormations };
        this.saveToStorage();
        return true;
      }
      return false;
    }
    deleteCategorie(id) {
      this.data.categories = this.data.categories.filter(c => c.id !== id);
      this.saveToStorage();
    }

    // PAIEMENTS
    getPaiements() { return this.data.paiements; }
    addPaiement(paiement) {
      const newPaiement = { ...paiement, id: this.generateId() };
      this.data.paiements.push(newPaiement);
      this.saveToStorage();
      return newPaiement;
    }
    updatePaiement(id, updatedPaiement) {
      const index = this.data.paiements.findIndex(p => p.id === id);
      if (index !== -1) {
        this.data.paiements[index] = { ...updatedPaiement, id };
        this.saveToStorage();
        return true;
      }
      return false;
    }
    deletePaiement(id) {
      this.data.paiements = this.data.paiements.filter(p => p.id !== id);
      this.saveToStorage();
    }

    getStats() {
      const totalClients = this.data.clients.length;
      const totalFormations = this.data.formations.length;
      const totalFormateurs = this.data.formateurs.length;
      const revenuTotal = this.data.paiements.filter(p => p.statut === 'Payé').reduce((sum, p) => sum + p.montant, 0);
      return { totalClients, totalFormations, totalFormateurs, revenuTotal };
    }

    getRevenusMensuels() {
      const mois = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sep', 'Oct', 'Nov', 'Déc'];
      const revenus = Array(12).fill(0);
      this.data.paiements.filter(p => p.statut === 'Payé').forEach(p => {
        const date = new Date(p.date);
        const moisIndex = date.getMonth();
        revenus[moisIndex] += p.montant;
      });
      return { labels: mois, data: revenus.map(r => Math.round(r / 100) / 10) };
    }

    getInscriptionsMensuelles() {
      const mois = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sep', 'Oct', 'Nov', 'Déc'];
      const inscriptions = Array(12).fill(0);
      this.data.clients.forEach(c => {
        const date = new Date(c.date);
        const moisIndex = date.getMonth();
        inscriptions[moisIndex]++;
      });
      return { labels: mois, data: inscriptions };
    }
  }

  function updateCharts() {
    if (dataManager.charts.revenu) dataManager.charts.revenu.destroy();
    if (dataManager.charts.inscription) dataManager.charts.inscription.destroy();
    const revenusData = dataManager.getRevenusMensuels();
    const inscriptionsData = dataManager.getInscriptionsMensuelles();
    const ctxRevenu = document.getElementById('revenuChart');
    const ctxInscription = document.getElementById('inscriptionChart');
    if (ctxRevenu) dataManager.charts.revenu = new Chart(ctxRevenu, { type: 'line', data: { labels: revenusData.labels, datasets: [{ label: 'Revenus (k€)', data: revenusData.data, borderColor: '#4361ee', tension: 0.3 }] }, options: { responsive: true } });
    if (ctxInscription) dataManager.charts.inscription = new Chart(ctxInscription, { type: 'bar', data: { labels: inscriptionsData.labels, datasets: [{ label: 'Inscriptions', data: inscriptionsData.data, backgroundColor: '#06d6a0' }] } });
  }

  function loadPage(page) {
    const main = document.getElementById('mainContent');
    let html = '';
    switch(page) {
      case 'dashboard': html = getDashboardHTML(); break;
      case 'clients': html = getClientsHTML(); break;
      case 'formateurs': html = getFormateursHTML(); break;
      case 'formations': html = getFormationsHTML(); break;
      case 'categories': html = getCategoriesHTML(); break;
      case 'paiements': html = getPaiementsHTML(); break;
      case 'parametres': html = getParametresHTML(); break;
      default: html = getDashboardHTML();
    }
    main.innerHTML = html;
    document.querySelectorAll('.nav-link[data-page]').forEach(l => l.classList.remove('active'));
    document.querySelector(`.nav-link[data-page="${page}"]`).classList.add('active');
    if (page === 'dashboard') setTimeout(updateCharts, 100);
    updateModalSelects();
  }

  // CLIENTS CRUD (avec code généré)
  function openClientModal(id = null) {
    const modal = new bootstrap.Modal(document.getElementById('clientModal'));
    const form = document.getElementById('clientForm');
    const title = document.getElementById('modalClientTitle');
    if (id) {
      const client = dataManager.getClients().find(c => c.id === id);
      if (client) {
        title.textContent = 'Modifier le client';
        document.getElementById('clientId').value = client.id;
        document.getElementById('clientNom').value = client.nom;
        document.getElementById('clientEmail').value = client.email;
        document.getElementById('clientTel').value = client.tel;
        document.getElementById('clientDate').value = client.date;
        document.getElementById('clientFormations').value = client.formations;
      }
    } else {
      title.textContent = 'Ajouter un client';
      form.reset();
      document.getElementById('clientId').value = '';
      document.getElementById('clientDate').value = new Date().toISOString().split('T')[0];
    }
    modal.show();
  }
  function saveClient() {
    const id = document.getElementById('clientId').value;
    const clientData = { nom: document.getElementById('clientNom').value, email: document.getElementById('clientEmail').value, tel: document.getElementById('clientTel').value, date: document.getElementById('clientDate').value, formations: document.getElementById('clientFormations').value };
    if (!clientData.nom || !clientData.email) { alert('Veuillez remplir tous les champs obligatoires'); return; }
    if (id) dataManager.updateClient(id, clientData);
    else dataManager.addClient(clientData);
    bootstrap.Modal.getInstance(document.getElementById('clientModal')).hide();
    loadPage('clients');
  }
  function editClient(id) { openClientModal(id); }
  function deleteClient(id) { if (confirm('Êtes-vous sûr de vouloir supprimer ce client ?')) { dataManager.deleteClient(id); loadPage('clients'); } }

  function deletePaiement(id){ if(confirm('Supprimer ce paiement ?')){ dataManager.deletePaiement(id); loadPage('paiements'); } }
  
  function updateModalSelects(){ updateFormationSelects(); updatePaiementSelects(); }
  function resetData(){ if(confirm('Réinitialiser toutes les données ?')){ localStorage.removeItem(dataManager.storageKey); dataManager.initData(); loadPage('dashboard'); } }
  
  document.addEventListener('DOMContentLoaded',function(){ document.querySelectorAll('.nav-link[data-page]').forEach(link=>{ link.addEventListener('click',(e)=>{ e.preventDefault(); loadPage(link.dataset.page); }); }); loadPage('dashboard'); window.openClientModal=openClientModal; window.editClient=editClient; window.deleteClient=deleteClient; window.saveClient=saveClient; window.openFormateurModal=openFormateurModal; window.editFormateur=editFormateur; window.deleteFormateur=deleteFormateur; window.saveFormateur=saveFormateur; window.openFormationModal=openFormationModal; window.editFormation=editFormation; window.deleteFormation=deleteFormation; window.saveFormation=saveFormation; window.openCategorieModal=openCategorieModal; window.editCategorie=editCategorie; window.deleteCategorie=deleteCategorie; window.saveCategorie=saveCategorie; window.openPaiementModal=openPaiementModal; window.editPaiement=editPaiement; window.deletePaiement=deletePaiement; window.savePaiement=savePaiement; window.resetData=resetData; });
</script>
