<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpSkill · Demande de devis formation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f9 100%);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1a2639;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            flex: 1;
        }

        .form-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25), 0 8px 24px -6px rgba(0, 32, 64, 0.1);
            padding: 2.5rem 2.8rem;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .logo-icon {
            background: #0b2b4f;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        
        .logo-text {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(130deg, #0b2b4f 30%, #2d5a8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-text span {
            color: #c9a13b;
        }

        .title-section h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #0b2b4f;
            margin-bottom: 0.5rem;
            border-left: 6px solid #c9a13b;
            padding-left: 1.3rem;
        }
        
        .title-section .subhead {
            font-size: 1.1rem;
            color: #415a77;
            margin-bottom: 2rem;
            background: #f0f5fa;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            display: inline-block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.8rem 2rem;
            margin-top: 1rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        label i {
            color: #c9a13b;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #8a9bb5;
            font-size: 1.1rem;
            pointer-events: none;
        }
        
        .input-wrapper input,
        .input-wrapper select,
        .input-wrapper textarea {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 1.5px solid #e1e9f0;
            border-radius: 18px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: #ffffff;
            transition: all 0.2s ease;
        }
        
        .input-wrapper select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238a9bb5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
        }
        
        .input-wrapper textarea {
            min-height: 130px;
            resize: vertical;
        }
        
        .input-wrapper input:focus,
        .input-wrapper select:focus,
        .input-wrapper textarea:focus {
            outline: none;
            border-color: #0b2b4f;
            box-shadow: 0 4px 12px rgba(11, 43, 79, 0.15);
        }

        .button-container {
            margin-top: 2.5rem;
            text-align: center;
        }
        
        .btn-premium {
            background: #0b2b4f;
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .btn-premium i {
            color: #c9a13b;
            font-size: 1.5rem;
        }
        
        .btn-premium:hover {
            background: #133f64;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 3.5rem;
            background: #0b1a2e;
            border-radius: 40px 40px 24px 24px;
            padding: 2rem 2.5rem;
            color: #d4e0f0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        
        .footer-logo i {
            background: #c9a13b;
            color: #0b1a2e;
            border-radius: 12px;
            padding: 0.4rem;
        }
        
        .footer-contact {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .footer-contact div i {
            color: #c9a13b;
            width: 1.6rem;
        }
        
        .footer-copy {
            width: 100%;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #98aec6;
            border-top: 1px solid #1f3a57;
            padding-top: 1.5rem;
        }

        @media (max-width: 800px) {
            .form-card { padding: 1.8rem; }
            .form-grid { grid-template-columns: 1fr; }
            .field-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <div class="header-logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="logo-text">Up<span>Skill</span></div>
            </div>
            <div class="title-section">
                <h1>Demande de devis formation</h1>
                <div class="subhead">
                    <i class="fas fa-clipboard-list" style="margin-right: 10px; color: #c9a13b;"></i>
                    Remplissez ce formulaire pour recevoir une proposition personnalisée
                </div>
            </div>

            <!-- Affichage du message de succès/erreur (version simple) -->
            <div id="messageBox" style="display: none; margin-bottom: 20px; padding: 15px; border-radius: 12px; text-align: center;"></div>

            <form method="POST" action="">
                <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
                
                <div class="form-grid">
                    <div class="field-group">
                        <label><i class="fas fa-user"></i> Nom complet *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" name="nom" id="nom" required>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-envelope"></i> Adresse email *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="email" id="email" required>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-phone-alt"></i> Téléphone *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" name="telephone" id="telephone" required>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-building"></i> Entreprise *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text" name="entreprise" id="entreprise" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label><i class="fas fa-layer-group"></i> Domaine de formation *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-tag"></i>
                            <select name="domaine" id="domaine" required>
                                <option value="" selected disabled>-- Sélectionnez un domaine --</option>
                                <option value="Management">Management</option>
                                <option value="Data">Data</option>
                                <option value="IT & Technologie">IT & Technologie</option>
                                <option value="Soft skills">Soft skills</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-graduation-cap"></i> Intitulé de la formation *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-pencil"></i>
                            <input type="text" name="intitule" id="intitule" required>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-users"></i> Nombre de participants *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-friends"></i>
                            <input type="number" name="participants" id="participants" min="1" required>
                        </div>
                    </div>
                    
                    <div class="field-group">
                        <label><i class="fas fa-city"></i> Ville *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" name="ville" id="ville" required>
                        </div>
                    </div>
                    
                    <div class="field-group full-width">
                        <label><i class="fas fa-file-alt"></i> Détails de votre demande *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-align-left"></i>
                            <textarea name="details" id="details" rows="4" required></textarea>
                        </div>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-premium">
                        <i class="fas fa-file-invoice"></i> Envoyer ma demande de devis
                    </button>
                </div>
            </form>
        </div>

        <footer class="footer">
            <div class="footer-logo">
                <i class="fas fa-graduation-cap"></i> UpSkill
            </div>
            <div class="footer-contact">
                <div><i class="fas fa-envelope"></i> contact@upskill-rh.fr</div>
                <div><i class="fas fa-phone-alt"></i> +33 1 87 65 43 21</div>
                <div><i class="fas fa-map-pin"></i> 12 rue du progrès, 75010 Paris</div>
            </div>
            <div class="footer-copy">
                © 2025 UpSkill Formation. Tous droits réservés.
            </div>
        </footer>
    </div>

    <script>
        // Afficher un message si présent dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const message = urlParams.get('message');
        const messageType = urlParams.get('type');
        
        if (message) {
            const messageBox = document.getElementById('messageBox');
            messageBox.style.display = 'block';
            messageBox.innerHTML = message;
            messageBox.style.backgroundColor = messageType === 'success' ? '#d4edda' : '#f8d7da';
            messageBox.style.color = messageType === 'success' ? '#155724' : '#721c24';
            messageBox.style.border = messageType === 'success' ? '1px solid #c3e6cb' : '1px solid #f5c6cb';
            
            // Faire disparaître le message après 5 secondes
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
